name: calibration feedback

# Weekly: collect /rate N replies from Telegram and append them to
# data/calibration.csv. This gathers evidence for a human to act on — there is no
# automatic weight fitting, deliberately. See docs/TUNING.md.

on:
  schedule:
    - cron: '23 9 * * 1'   # Mondays, 09:23 UTC
  workflow_dispatch:

concurrency:
  group: sunset-feedback
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  feedback:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect ratings
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m sunset_rider.feedback

      - name: Commit calibration data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/calibration.csv state/telegram_offset.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "calibration: new ratings [skip ci]"
            git push
          fi
